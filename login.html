<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InkySwot — Members Access</title>
<meta name="description" content="InkySwot Members Access">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: #0a0806;
  color: #e8e0d0;
}

/* BACKGROUND */
.bg {
  position: fixed; inset: 0;
  background-image: url('inkylogin-bg.png');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  z-index: 0;
}

/* OVERLAY — subtle darkening to help form legibility */
.bg-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.35);
  z-index: 1;
}

/* FORM PANEL — positioned over the brass plate */
.panel {
  position: fixed;
  z-index: 10;
  /* Positioned to sit over the brass plate in the image */
  left: 27%;
  top: 44%;
  width: 28%;
  transform: translateY(-50%) perspective(600px) rotateX(4deg);
  opacity: 0;
  animation: fadeIn 1.2s ease 0.5s forwards;
}

/* TABS — Log In / Sign Up */
.tabs {
  display: flex;
  margin-bottom: 18px;
  gap: 2px;
}

.tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 7px 18px;
  cursor: pointer;
  border: 1px solid rgba(201, 146, 58, 0.3);
  background: rgba(10, 8, 6, 0.6);
  color: #8a7860;
  transition: all 0.3s ease;
}

.tab.active {
  background: rgba(201, 146, 58, 0.15);
  border-color: #c9923a;
  color: #c9923a;
}

.tab:hover:not(.active) {
  border-color: rgba(201, 146, 58, 0.5);
  color: #b0a090;
}

/* FORM */
.form {
  display: none;
  flex-direction: column;
  gap: 14px;
}
.form.active { display: flex; }

.field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #c9923a;
  margin-bottom: 5px;
  display: block;
}

.field-input {
  width: 100%;
  background: rgba(10, 8, 6, 0.75);
  border: 1px solid rgba(201, 146, 58, 0.4);
  border-radius: 1px;
  padding: 9px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #e8e0d0;
  outline: none;
  transition: border-color 0.3s ease, background 0.3s ease;
}
.field-input:focus {
  border-color: #c9923a;
  background: rgba(10, 8, 6, 0.9);
}
.field-input::placeholder { color: #4a3a28; }

.btn-enter {
  width: 100%;
  margin-top: 4px;
  padding: 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  background: rgba(201, 146, 58, 0.9);
  border: 1px solid #c9923a;
  color: #0a0806;
  cursor: pointer;
  transition: background 0.3s ease;
}
.btn-enter:hover { background: #e8b060; border-color: #e8b060; }

.form-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: #4a3a28;
  text-align: center;
  margin-top: 2px;
}

.form-note a {
  color: #8a7860;
  text-decoration: none;
  border-bottom: 1px solid #4a3a28;
  transition: color 0.3s ease, border-color 0.3s ease;
}
.form-note a:hover { color: #c9923a; border-bottom-color: #c9923a; }

/* ERROR MESSAGE */
.error-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: #c9923a;
  text-align: center;
  min-height: 14px;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-46%) perspective(600px) rotateX(4deg); }
  to   { opacity: 1; transform: translateY(-50%) perspective(600px) rotateX(4deg); }
}

/* RESPONSIVE */
@media (max-width: 1100px) {
  .panel { left: 24%; width: 32%; }
}
@media (max-width: 800px) {
  .panel {
    left: 50%; top: 50%;
    width: 88%;
    transform: translate(-50%, -50%);
    animation: fadeInCenter 1.2s ease 0.5s forwards;
  }
  @keyframes fadeInCenter {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
}

</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="panel">

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Log In</div>
    <div class="tab" onclick="showTab('signup')">Sign Up</div>
  </div>

  <!-- LOG IN FORM -->
  <div class="form active" id="form-login">
    <div>
      <label class="field-label" for="login-email">Email</label>
      <input class="field-input" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div>
      <label class="field-label" for="login-password">Password</label>
      <input class="field-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn-enter" onclick="handleLogin()">Enter</button>
    <div class="form-note"><a href="#" onclick="showForgot()">Forgot your passphrase?</a></div>
  </div>

  <!-- SIGN UP FORM -->
  <div class="form" id="form-signup">
    <div>
      <label class="field-label" for="signup-email">Email</label>
      <input class="field-input" type="email" id="signup-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div>
      <label class="field-label" for="signup-password">Password</label>
      <input class="field-input" type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div>
      <label class="field-label" for="signup-confirm">Confirm Password</label>
      <input class="field-input" type="password" id="signup-confirm" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="error-msg" id="signup-error"></div>
    <button class="btn-enter" onclick="handleSignup()">Request Admission</button>
    <div class="form-note">By joining you agree to our <a href="#">terms</a> and <a href="#">privacy policy</a>.</div>
  </div>

</div>

<script>

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
}

function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const err   = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Please enter your email and password.'; return; }
  // Authentication to be wired to Supabase in Step 4
  // For now — forward to app
  window.location.href = 'index.html';
}

function handleSignup() {
  const email   = document.getElementById('signup-email').value.trim();
  const pass    = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  const err     = document.getElementById('signup-error');
  err.textContent = '';
  if (!email || !pass || !confirm) { err.textContent = 'Please complete all fields.'; return; }
  if (pass !== confirm) { err.textContent = 'Passwords do not match.'; return; }
  if (pass.length < 8)  { err.textContent = 'Password must be at least 8 characters.'; return; }
  // Signup to be wired to Supabase in Step 4
  // For now — forward to app
  window.location.href = 'index.html';
}

function showForgot() {
  alert('Password reset coming in Step 9 — Resend.');
}

</script>
</body>
</html>
