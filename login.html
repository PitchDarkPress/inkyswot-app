<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InkySwot — Members Access</title>
<meta name="description" content="InkySwot Members Access">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }

body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: #0a0806;
  color: #e8e0d0;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* PANEL */
.panel {
  width: 100%;
  max-width: 640px;
  padding: 60px;
  border: 1px solid #221709;
  background: #0f0d0a;
  opacity: 0;
  animation: fadeIn 1.2s ease 0.3s forwards;
}

/* WORDMARK */
.wordmark {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 42px;
  font-weight: 900;
  color: #e8e0d0;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.members-access {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #c9923a;
  text-align: center;
  margin-bottom: 40px;
}

.gold-rule {
  width: 40px;
  height: 1px;
  background: #c9923a;
  margin: 0 auto 40px;
}

/* TABS */
.tabs {
  display: flex;
  margin-bottom: 32px;
  border-bottom: 1px solid #221709;
}

.tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 10px 24px;
  cursor: pointer;
  color: #4a3a28;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.3s ease;
}

.tab.active {
  color: #c9923a;
  border-bottom-color: #c9923a;
}

.tab:hover:not(.active) { color: #8a7860; }

/* FORM */
.form { display: none; flex-direction: column; gap: 24px; }
.form.active { display: flex; }

.field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #c9923a;
  margin-bottom: 8px;
  display: block;
}

.field-input {
  width: 100%;
  background: #0a0806;
  border: 1px solid #2a2010;
  padding: 14px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: #e8e0d0;
  outline: none;
  transition: border-color 0.3s ease;
  border-radius: 0;
}
.field-input:focus { border-color: #c9923a; }
.field-input::placeholder { color: #2a2010; }

.btn-enter {
  width: 100%;
  margin-top: 8px;
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  background: #c9923a;
  border: 1px solid #c9923a;
  color: #0a0806;
  cursor: pointer;
  transition: background 0.3s ease;
}
.btn-enter:hover { background: #e8b060; border-color: #e8b060; }

.error-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #c9923a;
  text-align: center;
  min-height: 16px;
}

.form-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: #4a3a28;
  text-align: center;
}

.form-note a {
  color: #8a7860;
  text-decoration: none;
  border-bottom: 1px solid #4a3a28;
  transition: color 0.3s ease, border-color 0.3s ease;
}
.form-note a:hover { color: #c9923a; border-bottom-color: #c9923a; }

/* FOOTER */
.panel-footer {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #221709;
  text-align: center;
  margin-top: 40px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 680px) {
  .panel { padding: 40px 24px; }
  .wordmark { font-size: 32px; }
}

</style>
</head>
<body>

<div class="panel">

  <div class="wordmark">InkySwot</div>
  <div class="members-access">Members Access</div>
  <div class="gold-rule"></div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Log In</div>
    <div class="tab" onclick="showTab('signup')">Sign Up</div>
  </div>

  <!-- LOG IN FORM -->
  <div class="form active" id="form-login">
    <div>
      <label class="field-label" for="login-email">Email</label>
      <input class="field-input" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div>
      <label class="field-label" for="login-password">Password</label>
      <input class="field-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="btn-enter" onclick="handleLogin()">Enter</button>
    <div class="form-note"><a href="#" onclick="showForgot()">Forgot your password?</a></div>
  </div>

  <!-- SIGN UP FORM -->
  <div class="form" id="form-signup">
    <div>
      <label class="field-label" for="signup-email">Email</label>
      <input class="field-input" type="email" id="signup-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div>
      <label class="field-label" for="signup-password">Password</label>
      <input class="field-input" type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div>
      <label class="field-label" for="signup-confirm">Confirm Password</label>
      <input class="field-input" type="password" id="signup-confirm" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="error-msg" id="signup-error"></div>
    <button class="btn-enter" onclick="handleSignup()">Request Admission</button>
    <div class="form-note">By joining you agree to our <a href="#">terms</a> and <a href="#">privacy policy</a>.</div>
  </div>

  <div class="panel-footer">PUBLISH AND BE DAMNED</div>

</div>

<script>

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
}

function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const err   = document.getElementById('login-error');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Please enter your email and password.'; return; }
  // To be wired to Supabase in Step 4
  window.location.href = 'index.html';
}

function handleSignup() {
  const email   = document.getElementById('signup-email').value.trim();
  const pass    = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  const err     = document.getElementById('signup-error');
  err.textContent = '';
  if (!email || !pass || !confirm) { err.textContent = 'Please complete all fields.'; return; }
  if (pass !== confirm) { err.textContent = 'Passwords do not match.'; return; }
  if (pass.length < 8)  { err.textContent = 'Password must be at least 8 characters.'; return; }
  // To be wired to Supabase in Step 4
  window.location.href = 'index.html';
}

function showForgot() {
  alert('Password reset coming in Step 9 — Resend.');
}

</script>
</body>
</html>
